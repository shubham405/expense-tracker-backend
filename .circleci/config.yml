version: 2.1

jobs:
  build:
    machine: true
    resource_class: shubham405/local-runner  # 👈 IMPORTANT
    steps:
      - checkout
      - run:
          name: Build app
          command: ./mvnw clean package -DskipTests

      - persist_to_workspace:
          root: .
          paths:
            - target/*.jar

  deploy:
    machine: true
    resource_class: your-namespace/your-runner   # 👈 IMPORTANT
    steps:
      - attach_workspace:
          at: .

      - run:
          name: Deploy app
          command: |
            echo "Deploying app..."
            scp target/*.jar ubuntu@YOUR_IP:/home/ubuntu/app/app.jar

workflows:
  build_and_deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build
